name: Test

on: [pull_request, workflow_call]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'true'
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
      - name: Install and test
        run: |
          npm ci --loglevel error
          npm run build
          npm run test
      - name: Start dbus
        run: |
          sudo service dbus start
          export XDG_RUNTIME_DIR=/tmp/xdg_runtime
          mkdir $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR
          chown $(id -un):$(id -gn) $XDG_RUNTIME_DIR
          export DBUS_SESSION_BUS_ADDRESS=unix:path=$XDG_RUNTIME_DIR/bus
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          dbus-daemon --session --address=$DBUS_SESSION_BUS_ADDRESS --nofork --nopidfile --syslog-only &
      - name: Run integration test
        # Replaces coactions/setup-xvfb, which has no Node 24 release. That
        # action just apt-installs xvfb and wraps the command in xvfb-run.
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-xserver-utils
          xvfb-run --auto-servernum npm run integration
    env:
      CI: true
